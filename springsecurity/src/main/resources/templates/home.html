<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0; }
        .card { background:#fff; padding:2rem 2.5rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.15); text-align:center; }
        h2 { color:#333; }
        .badge { display:inline-block; background:#4f46e5; color:#fff; padding:.3rem .8rem; border-radius:999px; font-size:.85rem; margin-bottom:1rem; }
        a { display:inline-block; margin-top:1.5rem; padding:.6rem 1.5rem; background:#dc2626; color:#fff; border-radius:4px; text-decoration:none; }
        a:hover { background:#b91c1c; }
    </style>
</head>
<body>
<div class="card">
    <div class="badge" sec:authentication="principal.authorities">🔒 Authenticated</div>
    <h2>Welcome, <span th:text="${username}">User</span>!</h2>
    <p>You have successfully logged in with Spring Security.</p>
    <p style="color:#6b7280;font-size:.9rem">Your password is stored as a BCrypt hash in MySQL.</p>
    <a th:href="@{/logout}">Logout</a>
</div>
</body>
</html>

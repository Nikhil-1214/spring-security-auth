<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body { font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0; }
        .card { background:#fff; padding:2rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.15); width:320px; }
        h2 { margin-top:0; color:#333; }
        input { width:100%; padding:.6rem; margin:.4rem 0 1rem; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; }
        button { width:100%; padding:.7rem; background:#059669; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
        button:hover { background:#047857; }
        .alert-error { color:#b91c1c; background:#fee2e2; padding:.5rem; border-radius:4px; margin-bottom:1rem; }
        a { color:#4f46e5; }
    </style>
</head>
<body>
<div class="card">
    <h2>📝 Register</h2>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required />

        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required />
        <label>Salary</label>
        <input type="number" name="salary" placeholder="Enter salary" required />
        <button type="submit">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:1rem">
        Already have an account? <a th:href="@{/login}">Login</a>
    </p>
</div>
</body>
</html>

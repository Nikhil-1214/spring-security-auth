<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; margin:0; }
        .card { background:#fff; padding:2rem; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.15); width:320px; }
        h2 { margin-top:0; color:#333; }
        input { width:100%; padding:.6rem; margin:.4rem 0 1rem; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; }
        button { width:100%; padding:.7rem; background:#4f46e5; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem; }
        button:hover { background:#4338ca; }
        .alert-error   { color:#b91c1c; background:#fee2e2; padding:.5rem; border-radius:4px; margin-bottom:1rem; }
        .alert-success { color:#15803d; background:#dcfce7; padding:.5rem; border-radius:4px; margin-bottom:1rem; }
        a { color:#4f46e5; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Login</h2>

    <div th:if="${error}"   class="alert-error"   th:text="${error}"></div>
    <div th:if="${message}" class="alert-success" th:text="${message}"></div>
    <div th:if="${param.registered}" class="alert-success">Registered! Please log in.</div>

    <form th:action="@{/login}" method="post">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required />

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required />

        <button type="submit">Login</button>
    </form>
    <p style="text-align:center;margin-top:1rem">
        No account? <a th:href="@{/register}">Register</a>
    </p>
</div>
</body>
</html>
